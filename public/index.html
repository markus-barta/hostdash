<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hsb1 · home server</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f4f6f4;
    --surface: #ffffff;
    --surface-2: #f9faf8;
    --surface-3: #eef2ec;
    --line: #dce3da;
    --line-strong: #c6d1c3;
    --ink: #172016;
    --muted: #62705f;
    --soft: #84907f;
    --shadow: 0 14px 32px rgba(32, 45, 31, 0.08);
    --home: #d45c3f;
    --media: #b55787;
    --signals: #c98625;
    --safety: #668d55;
    --infra: #777465;
    --up: #267a53;
    --checking: #d49324;
    --down: #ba372d;
    --passive: #9ca79a;
    --sans: Inter, "Avenir Next", Avenir, "Segoe UI", system-ui, -apple-system, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, "Cascadia Code", monospace;
    --zoom: 1;
  }

  * { box-sizing: border-box; }
  html { min-height: 100%; background: var(--bg); }
  body {
    min-height: 100vh;
    margin: 0;
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    background:
      linear-gradient(180deg, rgba(238, 242, 236, 0.86), rgba(244, 246, 244, 0) 320px),
      var(--bg);
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button, input { font: inherit; }
  svg {
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .app {
    display: grid;
    grid-template-columns: 264px minmax(0, 1fr);
    min-height: 100vh;
  }

  .side {
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 24px 18px;
    border-right: 1px solid var(--line);
    background: rgba(249, 250, 248, 0.9);
    backdrop-filter: blur(14px);
  }

  .brand {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 12px;
    align-items: center;
    padding: 4px 6px 22px;
  }
  .mark {
    display: grid;
    place-items: center;
    width: 44px;
    height: 44px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    color: var(--home);
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.04);
  }
  .mark svg, .icon svg, .action svg, .heading svg { width: 20px; height: 20px; }
  .brand h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1;
    letter-spacing: 0;
    font-weight: 760;
  }
  .brand p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }

  .status-panel {
    display: grid;
    gap: 12px;
    margin: 0 0 20px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
  }
  .status-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .status-row span {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .status-row strong {
    font-size: 24px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }
  .status-row strong b { color: var(--up); }
  .clock {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .nav {
    display: grid;
    gap: 6px;
  }
  .chip {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    gap: 10px;
    align-items: center;
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--ink);
    background: transparent;
    cursor: pointer;
    text-align: left;
  }
  .chip:hover { background: var(--surface-3); }
  .chip[aria-pressed="true"] {
    border-color: color-mix(in srgb, var(--c) 34%, var(--line));
    background: color-mix(in srgb, var(--c) 11%, var(--surface));
  }
  .chip .swatch {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--c, var(--ink));
  }
  .chip .label { font-size: 13px; font-weight: 650; }
  .chip .n {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .main {
    min-width: 0;
    max-width: 100vw;
    padding: 28px clamp(18px, 4vw, 48px) 56px;
  }
  .topbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
    gap: 18px;
    align-items: center;
    margin: 0 0 22px;
  }
  .title {
    min-width: 0;
  }
  .eyebrow {
    display: inline-flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    overflow-wrap: anywhere;
  }
  .eyebrow::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 0 5px rgba(38, 122, 83, 0.12);
  }
  .title h2 {
    margin: 0;
    max-width: 760px;
    font-size: 30px;
    line-height: 1.1;
    letter-spacing: 0;
    font-weight: 780;
  }
  .title p {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    overflow-wrap: anywhere;
  }

  .top-actions {
    display: grid;
    gap: 10px;
    min-width: 0;
    width: 100%;
  }
  .search {
    position: relative;
    min-width: 0;
  }
  .search input {
    width: 100%;
    min-width: 0;
    min-height: 48px;
    padding: 0 72px 0 14px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    outline: none;
    color: var(--ink);
    background: var(--surface);
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.04);
  }
  .search input:focus {
    border-color: var(--home);
    box-shadow: 0 0 0 4px rgba(212, 92, 63, 0.12);
  }
  .search svg {
    position: absolute;
    right: 14px;
    top: 50%;
    width: 18px;
    height: 18px;
    transform: translateY(-50%);
    color: var(--muted);
  }
  .kbd {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    min-width: 24px;
    padding: 1px 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--muted);
    background: var(--surface-2);
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
  }

  .zoom {
    display: grid;
    grid-template-columns: 34px minmax(96px, 1fr) 46px 48px;
    gap: 8px;
    align-items: center;
    min-width: 0;
    min-height: 38px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: color-mix(in srgb, var(--surface) 78%, var(--surface-3));
  }
  .zoom button {
    display: grid;
    place-items: center;
    height: 28px;
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--muted);
    background: var(--surface);
    cursor: pointer;
  }
  .zoom button:hover {
    color: var(--ink);
    border-color: var(--line-strong);
  }
  .zoom button svg {
    width: 16px;
    height: 16px;
  }
  .zoom input {
    width: 100%;
    min-width: 0;
    accent-color: var(--home);
  }
  .zoom output {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .workspace {
    zoom: var(--zoom);
    transform-origin: top left;
  }

  .mobile-chips {
    display: none;
    gap: 8px;
    margin: 0 0 22px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .mobile-chips .chip {
    width: auto;
    min-width: max-content;
    grid-template-columns: 8px auto auto;
    background: var(--surface);
    border-color: var(--line);
  }

  .wing {
    --c: var(--home);
    margin: 0 0 34px;
  }
  .heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin: 0 0 12px;
  }
  .heading-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .heading svg { color: var(--c); }
  .heading h2 {
    margin: 0;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .heading .n {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }
  .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, color-mix(in srgb, var(--c) 44%, var(--line)), transparent);
  }

  .deck {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
    gap: 12px;
    min-width: 0;
  }

  .svc {
    position: relative;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    min-height: 168px;
    min-width: 0;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.04);
    transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
  }
  a.svc:hover {
    transform: translateY(-2px);
    border-color: color-mix(in srgb, var(--c) 48%, var(--line));
    box-shadow: var(--shadow);
  }
  a.svc:focus-visible {
    outline: 3px solid color-mix(in srgb, var(--c) 32%, transparent);
    outline-offset: 2px;
  }
  .svc.passive {
    background: linear-gradient(180deg, var(--surface-2), color-mix(in srgb, var(--c) 5%, var(--surface-2)));
    border-style: dashed;
  }
  .svc-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-width: 0;
  }
  .icon {
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    color: var(--c);
    background: color-mix(in srgb, var(--c) 10%, var(--surface));
  }
  .state {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: 24px;
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
    background: var(--surface-2);
    font-size: 11px;
    font-weight: 750;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--passive);
  }
  .state[data-s="up"] { color: var(--up); border-color: rgba(38, 122, 83, 0.25); }
  .state[data-s="up"] .dot { background: var(--up); box-shadow: 0 0 0 4px rgba(38, 122, 83, 0.12); }
  .state[data-s="checking"] { color: var(--checking); border-color: rgba(212, 147, 36, 0.28); }
  .state[data-s="checking"] .dot { background: var(--checking); animation: breathe 1.4s ease-in-out infinite; }
  .state[data-s="down"] { color: var(--down); border-color: rgba(186, 55, 45, 0.24); }
  .state[data-s="down"] .dot { background: var(--down); }
  .state[data-s="cert"] { color: var(--checking); border-color: rgba(212, 147, 36, 0.28); }
  .state[data-s="cert"] .dot { background: var(--checking); box-shadow: 0 0 0 4px rgba(212, 147, 36, 0.12); }
  .state[data-s="passive"] { color: var(--soft); }
  .state[data-s="passive"] .dot { background: transparent; box-shadow: inset 0 0 0 1.5px var(--passive); }

  .svc h3 {
    margin: 0;
    font-size: 18px;
    line-height: 1.2;
    letter-spacing: 0;
  }
  .purpose {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .svc-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: var(--muted);
  }
  .port {
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .action {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--c);
    font-size: 12px;
    font-weight: 760;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.16s ease, transform 0.16s ease;
  }
  .action svg { width: 14px; height: 14px; }
  a.svc:hover .action, a.svc:focus-visible .action {
    opacity: 1;
    transform: translateX(0);
  }

  .empty {
    display: none;
    padding: 26px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
  }

  .hidden { display: none !important; }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
  }
  .meta span {
    padding: 6px 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
  }
  .meta code {
    font-family: var(--mono);
    font-size: 11px;
  }

  @keyframes breathe { 50% { opacity: 0.36; } }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  @media (max-width: 900px) {
    .app { display: block; }
    .side { display: none; }
    .main { padding-top: 22px; }
    .topbar { grid-template-columns: 1fr; align-items: stretch; }
    .mobile-chips { display: flex; }
    .title h2 { font-size: 30px; }
  }
  @media (max-width: 560px) {
    .main { padding-inline: 14px; }
    .zoom { grid-template-columns: 34px minmax(80px, 1fr) 42px; }
    .zoom output { display: none; }
    .deck { grid-template-columns: 1fr; }
    .heading { align-items: flex-start; }
    .rule { display: none; }
    .svc { min-height: 148px; }
    .title h2 { font-size: 28px; }
  }
</style>
</head>

  <symbol id="i-maximize" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></symbol>
  <symbol id="i-logo-ha" viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9 20v-5h6v5"/><path d="M8 12h8"/><path d="M12 8v4"/></symbol>
  <symbol id="i-logo-nodered" viewBox="0 0 24 24"><rect width="6" height="6" x="3" y="3" rx="1.5"/><rect width="6" height="6" x="15" y="3" rx="1.5"/><rect width="6" height="6" x="9" y="15" rx="1.5"/><path d="M9 6h6"/><path d="M18 9v3a3 3 0 0 1-3 3h-3"/><path d="M6 9v3a3 3 0 0 0 3 3"/></symbol>
  <symbol id="i-logo-z2m" viewBox="0 0 24 24"><path d="M12 3v3"/><path d="M12 18v3"/><path d="m4.2 7.5 2.6 1.5"/><path d="m17.2 15 2.6 1.5"/><path d="m19.8 7.5-2.6 1.5"/><path d="m6.8 15-2.6 1.5"/><polygon points="12 6.5 16.8 9.25 16.8 14.75 12 17.5 7.2 14.75 7.2 9.25"/></symbol>
  <symbol id="i-logo-plex" viewBox="0 0 24 24"><path d="M8 4h4.2L18 12l-5.8 8H8l5.7-8z"/></symbol>
  <symbol id="i-logo-scrypted" viewBox="0 0 24 24"><path d="M5 7.5 12 4l7 3.5v6.2c0 4-3 6.2-7 7.3-4-1.1-7-3.3-7-7.3z"/><circle cx="12" cy="12" r="3.2"/><path d="M12 8.8v6.4"/><path d="M8.8 12h6.4"/></symbol>
  <symbol id="i-logo-mqtt" viewBox="0 0 24 24"><path d="M4 16a8 8 0 0 1 8-8"/><path d="M4 20c0-8.8 7.2-16 16-16"/><path d="M8 20c0-6.6 5.4-12 12-12"/><circle cx="4" cy="20" r="1.5" fill="currentColor" stroke="none"/></symbol>
  <symbol id="i-logo-apprise" viewBox="0 0 24 24"><path d="M6 9a6 6 0 1 1 12 0c0 4.5 1.4 6 2.7 7.3A1 1 0 0 1 20 18H4a1 1 0 0 1-.7-1.7C4.6 15 6 13.5 6 9"/><path d="M10 21h4"/><path d="M8 5 5 2"/><path d="m16 5 3-3"/></symbol>
  <symbol id="i-logo-pixdcon" viewBox="0 0 24 24"><rect width="16" height="16" x="4" y="4" rx="3"/><path d="M8 8h.01"/><path d="M12 8h.01"/><path d="M16 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M8 16h.01"/><path d="M12 16h.01"/><path d="M16 16h.01"/></symbol>
</defs></svg>

<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="mark"><svg><use href="#i-server"></use></svg></div>
      <div>
        <h1>hsb1</h1>
        <p>home server</p>
      </div>
    </div>
    <section class="status-panel" aria-label="Host status">
      <div class="status-row"><span>Online</span><strong><b id="onCount">0</b>/<span id="totCount">0</span></strong></div>
      <div class="clock" id="clock"></div>
    </section>
    <nav class="nav" id="sideChips" aria-label="Service categories"></nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="title">
        <div class="eyebrow">NixOS · hsb1.lan · 192.168.1.101</div>
        <h2>Services</h2>
        <p>home server · hsb1.lan · 192.168.1.101 · NixOS</p>
      </div>
      <div class="top-actions">
        <label class="search">
          <input id="q" type="search" placeholder="Search services" autocomplete="off" aria-label="Search services">
          <span class="kbd">/</span>
          <svg><use href="#i-search"></use></svg>
        </label>
        <div class="zoom" role="group" aria-label="View zoom">
          <button id="zoomFit" type="button" title="Fit all services"><svg><use href="#i-maximize"></use></svg></button>
          <input id="zoomRange" type="range" min="50" max="200" step="5" value="100" aria-label="Zoom">
          <button id="zoomReset" type="button" title="100%">100</button>
          <output id="zoomValue" for="zoomRange">100%</output>
        </div>
      </div>
    </header>
    <section class="workspace" id="workspace" aria-label="Service overview">
      <div class="mobile-chips" id="mobileChips" aria-label="Service categories"></div>
      <div id="wings"></div>
      <div class="empty" id="empty">No services match the current filter.</div>
      <footer class="meta">
        <span><code>hosts/hsb1/docker</code></span>
        <span><code>hsb1-home</code></span>
        <span>Europe/Vienna</span>
      </footer>
    </section>
  </main>
</div>

<script>
const WINGS = [
  {id:"home", name:"Home & Automation", color:"var(--home)", icon:"house"},
  {id:"media", name:"Media & Play", color:"var(--media)", icon:"clapperboard"},
  {id:"signals", name:"Signals & Messaging", color:"var(--signals)", icon:"radio"},
  {id:"safety", name:"Cameras & Safety", color:"var(--safety)", icon:"camera"},
  {id:"infra", name:"Housekeeping", color:"var(--infra)", icon:"refresh-cw"},
];

const SVC = [
  {wing:"home", name:"Home Assistant", purpose:"Smart-home hub & automations", icon:"logo-ha", url:"http://hsb1.lan:8123/", port:":8123"},
  {wing:"home", name:"Node-RED", purpose:"Visual flow automation", icon:"logo-nodered", url:"http://hsb1.lan:1880/", port:":1880"},
  {wing:"home", name:"Zigbee2MQTT", purpose:"Zigbee to MQTT bridge", icon:"logo-z2m", url:"http://hsb1.lan:8888/", port:":8888"},
  {wing:"home", name:"opusweb", purpose:"OPUS greenNet EnOcean control", icon:"sliders", url:"http://hsb1.lan:3102/", port:":3102"},
  {wing:"home", name:"Matter Server", purpose:"Matter/Thread controller for HA", icon:"hexagon", passive:true, foot:":5580 api · no UI"},

  {wing:"media", name:"Plex", purpose:"Media library & streaming", icon:"logo-plex", url:"http://hsb1.lan:32400/web", port:":32400"},
  {wing:"media", name:"pixdcon", purpose:"Pixoo pixel-display controller", icon:"logo-pixdcon", url:"http://hsb1.lan:8080/", port:":8080"},
  {wing:"media", name:"funkeykid", purpose:"Kids audio/voice toy console", icon:"toy-brick", url:"http://hsb1.lan:8081/", port:":8081"},

  {wing:"signals", name:"Apprise", purpose:"Unified notification gateway", icon:"logo-apprise", url:"http://hsb1.lan:8001/", port:":8001"},
  {wing:"signals", name:"Mosquitto", purpose:"MQTT broker and message bus", icon:"logo-mqtt", passive:true, foot:":1883 · :9001 ws · broker"},
  {wing:"signals", name:"opus-stream-to-mqtt", purpose:"OPUS gateway to MQTT bridge", icon:"audio-waveform", passive:true, foot:"agent · no UI"},
  {wing:"signals", name:"SMTP relay", purpose:"Outbound container mail", icon:"mail", passive:true, foot:":25 internal · relay"},

  {wing:"safety", name:"Scrypted", purpose:"Camera/NVR hub to HomeKit/HA", icon:"logo-scrypted", url:"https://hsb1.lan:10443/", port:":10443", certIssue:true, note:"service answers with a self-signed localhost certificate"},
  {wing:"safety", name:"fritz-tripwire", purpose:"Snapshots mesh on device drop", icon:"shield-alert", url:"http://hsb1.lan:9000/", port:":9000", note:"plain-text status endpoint"},

  {wing:"infra", name:"Watchtower", purpose:"Weekly container auto-updates", icon:"refresh-cw", passive:true, foot:"Sat 05:00 · scheduled"},
  {wing:"infra", name:"restic", purpose:"Nightly backup to Hetzner", icon:"hard-drive-download", passive:true, foot:"01:30 daily · backup"},
  {wing:"infra", name:"FleetCom", purpose:"Heartbeats to fleet.barta.cm", icon:"satellite-dish", passive:true, foot:"agent · no UI"},
  {wing:"infra", name:"pharos-beacon", purpose:"Host status to pharosd on csb1", icon:"radar", passive:true, foot:"beacon · outbound only"},
  {wing:"infra", name:"claude-code", purpose:"Idle Claude Code shell", icon:"terminal", passive:true, foot:"shell · no UI"},
];

const el = (tag, className) => {
  const node = document.createElement(tag);
  if (className) node.className = className;
  return node;
};

const wingsEl = document.getElementById("wings");
const sideChips = document.getElementById("sideChips");
const mobileChips = document.getElementById("mobileChips");
const empty = document.getElementById("empty");
let filter = localStorage.getItem("hsb1.wing") || "all";
const cardIndex = [];

function makeChip(id, label, color) {
  const button = el("button", "chip");
  button.type = "button";
  button.dataset.wing = id;
  button.style.setProperty("--c", color || "var(--ink)");
  button.setAttribute("aria-pressed", id === filter);
  button.innerHTML = `<span class="swatch"></span><span class="label">${label}</span><span class="n" data-n="${id}">0</span>`;
  button.addEventListener("click", () => {
    filter = id;
    localStorage.setItem("hsb1.wing", id);
    applyFilter();
  });
  return button;
}

function renderChips(target) {
  target.appendChild(makeChip("all", "All services", "var(--ink)"));
  WINGS.forEach(wing => target.appendChild(makeChip(wing.id, wing.name, wing.color)));
}
renderChips(sideChips);
renderChips(mobileChips);

WINGS.forEach(wing => {
  const services = SVC.filter(service => service.wing === wing.id);
  const section = el("section", "wing");
  section.dataset.wing = wing.id;
  section.style.setProperty("--c", wing.color);

  const heading = el("div", "heading");
  heading.innerHTML = `
    <div class="heading-left">
      <svg><use href="#i-${wing.icon}"></use></svg>
      <h2>${wing.name}</h2>
      <span class="n">${services.length}</span>
    </div>
    <div class="rule"></div>`;
  section.appendChild(heading);

  const deck = el("div", "deck");
  services.forEach(service => {
    const active = !service.passive;
    const card = active ? el("a", "svc") : el("div", "svc passive");
    card.style.setProperty("--c", wing.color);
    card.dataset.name = `${service.name} ${service.purpose} ${service.port || service.foot || ""}`.toLowerCase();

    if (active) {
      card.href = service.url;
      card.target = "_blank";
      card.rel = "noopener";
      if (service.certIssue) card.dataset.staticState = "cert";
      else card.dataset.probe = service.url;
    }
    if (service.note) card.title = service.note;

    const status = service.certIssue ? "cert" : active ? "checking" : "passive";
    const statusLabel = statusText(status);
    const foot = active
      ? `<span class="port">${service.port}</span><span class="action">Open <svg><use href="#i-arrow"></use></svg></span>`
      : `<span class="port">${service.foot || ""}</span>`;

    card.innerHTML = `
      <div class="svc-top">
        <span class="icon"><svg><use href="#i-${service.icon}"></use></svg></span>
        <span class="state" data-s="${status}"><span class="dot"></span><span class="state-label">${statusLabel}</span></span>
      </div>
      <div>
        <h3>${service.name}</h3>
        <p class="purpose">${service.purpose}</p>
      </div>
      <div class="svc-foot">${foot}</div>`;
    deck.appendChild(card);
    if (active) cardIndex.push(card);
  });
  section.appendChild(deck);
  wingsEl.appendChild(section);
});

function statusText(state) {
  if (state === "up") return "Online";
  if (state === "down") return "Down";
  if (state === "cert") return "TLS cert";
  if (state === "checking") return "Checking";
  return "Passive";
}

function counts() {
  const per = {};
  WINGS.forEach(wing => { per[wing.id] = 0; });
  let online = 0;
  cardIndex.forEach(card => {
    const state = card.querySelector(".state").dataset.s;
    if (state === "up" || state === "cert") {
      online += 1;
      per[card.closest(".wing").dataset.wing] += 1;
    }
  });
  document.getElementById("onCount").textContent = online;
  document.getElementById("totCount").textContent = cardIndex.length;
  document.querySelectorAll(".chip .n").forEach(node => {
    const id = node.dataset.n;
    node.textContent = id === "all" ? `${online}/${cardIndex.length}` : (per[id] || 0);
  });
}

function syncPressed() {
  document.querySelectorAll(".chip").forEach(chip => {
    chip.setAttribute("aria-pressed", chip.dataset.wing === filter);
  });
}

function applyFilter() {
  syncPressed();
  runSearch();
}

const search = document.getElementById("q");
const workspace = document.getElementById("workspace");
const zoomRange = document.getElementById("zoomRange");
const zoomValue = document.getElementById("zoomValue");
const zoomFit = document.getElementById("zoomFit");
const zoomReset = document.getElementById("zoomReset");
const zoomKey = "hsb1.zoom";
const zoomModeKey = "hsb1.zoomMode";

function clampZoom(value) {
  return Math.max(50, Math.min(200, Math.round(Number(value) / 5) * 5));
}

function setZoom(value, mode = "manual") {
  const next = clampZoom(value);
  document.documentElement.style.setProperty("--zoom", String(next / 100));
  zoomRange.value = String(next);
  zoomValue.value = `${next}%`;
  localStorage.setItem(zoomKey, String(next));
  localStorage.setItem(zoomModeKey, mode);
}

function fitAll() {
  filter = "all";
  localStorage.setItem("hsb1.wing", filter);
  search.value = "";
  applyFilter();
  setZoom(100, "fit");
  requestAnimationFrame(() => {
    const box = workspace.getBoundingClientRect();
    const availableWidth = Math.max(320, document.documentElement.clientWidth - box.left - 18);
    const availableHeight = Math.max(360, window.innerHeight - box.top - 18);
    const scale = Math.min(1, availableWidth / workspace.scrollWidth, availableHeight / workspace.scrollHeight);
    setZoom(Math.max(50, Math.floor(scale * 100 / 5) * 5), "fit");
  });
}

zoomRange.addEventListener("input", () => setZoom(zoomRange.value));
zoomReset.addEventListener("click", () => setZoom(100));
zoomFit.addEventListener("click", fitAll);
window.addEventListener("resize", () => {
  if (localStorage.getItem(zoomModeKey) === "fit") fitAll();
});

setZoom(localStorage.getItem(zoomKey) || 100, localStorage.getItem(zoomModeKey) || "manual");

function runSearch() {
  const term = search.value.trim().toLowerCase();
  let visibleSections = 0;
  document.querySelectorAll(".wing").forEach(section => {
    if (filter !== "all" && section.dataset.wing !== filter) {
      section.classList.add("hidden");
      return;
    }

    let shown = 0;
    section.querySelectorAll(".svc").forEach(card => {
      const hit = !term || card.dataset.name.includes(term);
      card.classList.toggle("hidden", !hit);
      if (hit) shown += 1;
    });

    section.classList.toggle("hidden", shown === 0);
    if (shown > 0) visibleSections += 1;
  });
  empty.style.display = visibleSections === 0 ? "block" : "none";
}

search.addEventListener("input", runSearch);
document.addEventListener("keydown", event => {
  if (event.key === "/" && document.activeElement !== search) {
    event.preventDefault();
    search.focus();
  }
  if (event.key === "Escape") {
    search.value = "";
    search.blur();
    runSearch();
  }
});

function setStatus(card, state) {
  const badge = card.querySelector(".state");
  badge.dataset.s = state;
  badge.querySelector(".state-label").textContent = statusText(state);
}

function probe(card) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 4000);
  fetch(card.dataset.probe, { mode: "no-cors", signal: controller.signal })
    .then(() => setStatus(card, "up"))
    .catch(() => setStatus(card, "down"))
    .finally(() => {
      clearTimeout(timeout);
      counts();
    });
}

function sweep() {
  let index = 0;
  const queue = [...cardIndex];
  (function next() {
    if (index >= queue.length) return;
    const batch = queue.slice(index, index + 5);
    index += 5;
    batch.forEach(card => {
      if (card.dataset.staticState) {
        setStatus(card, card.dataset.staticState);
        counts();
        return;
      }
      setStatus(card, "checking");
      probe(card);
    });
    setTimeout(next, 300);
  })();
}

function tick() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleDateString("de-AT", { weekday: "short", day: "2-digit", month: "2-digit" }) +
    " · " +
    now.toLocaleTimeString("de-AT", { hour: "2-digit", minute: "2-digit" });
}

applyFilter();
counts();
tick();
sweep();
setInterval(tick, 60000);
setInterval(sweep, 25000 + Math.random() * 10000);
</script>
</body>
</html>
