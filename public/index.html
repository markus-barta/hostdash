<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HostDash</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f4f6f4;
    --surface: #ffffff;
    --surface-2: #f9faf8;
    --surface-3: #eef2ec;
    --line: #dce3da;
    --line-strong: #c6d1c3;
    --ink: #172016;
    --muted: #62705f;
    --soft: #84907f;
    --shadow: 0 14px 32px rgba(32, 45, 31, 0.08);
    --home: #d45c3f;
    --media: #b55787;
    --signals: #c98625;
    --safety: #668d55;
    --infra: #777465;
    --up: #267a53;
    --checking: #d49324;
    --down: #ba372d;
    --passive: #9ca79a;
    --sans: Inter, "Avenir Next", Avenir, "Segoe UI", system-ui, -apple-system, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, "Cascadia Code", monospace;
    --zoom: 1;
  }

  * { box-sizing: border-box; }
  html { min-height: 100%; background: var(--bg); }
  body {
    min-height: 100vh;
    margin: 0;
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    background:
      linear-gradient(180deg, rgba(238, 242, 236, 0.86), rgba(244, 246, 244, 0) 320px),
      var(--bg);
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }
  button, input { font: inherit; }
  svg {
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .app {
    display: grid;
    grid-template-columns: 292px minmax(0, 1fr);
    min-height: 100vh;
  }

  .side {
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 24px 20px;
    border-right: 1px solid var(--line);
    background: rgba(249, 250, 248, 0.9);
    backdrop-filter: blur(14px);
    overflow-y: auto;
    scrollbar-gutter: stable;
  }

  .brand {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 12px;
    align-items: center;
    padding: 4px 6px 22px;
  }
  .mark {
    display: grid;
    place-items: center;
    width: 44px;
    height: 44px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    color: var(--home);
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.04);
  }
  .mark svg, .icon svg, .action svg, .heading svg { width: 20px; height: 20px; }
  .brand h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1;
    letter-spacing: 0;
    font-weight: 760;
  }
  .brand p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }

  .status-panel {
    display: grid;
    gap: 12px;
    margin: 0 0 20px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
  }
  .status-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .status-row span {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .status-row strong {
    font-size: 24px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }
  .status-row strong b { color: var(--up); }
  .clock {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .nav {
    display: grid;
    gap: 6px;
  }
  .chip {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    gap: 10px;
    align-items: center;
    width: 100%;
    min-height: 38px;
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--ink);
    background: transparent;
    cursor: pointer;
    text-align: left;
  }
  .chip:hover { background: var(--surface-3); }
  .chip[aria-pressed="true"] {
    border-color: color-mix(in srgb, var(--c) 34%, var(--line));
    background: color-mix(in srgb, var(--c) 11%, var(--surface));
  }
  .chip .swatch {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--c, var(--ink));
  }
  .chip .label { font-size: 13px; font-weight: 650; }
  .chip .n {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .main {
    min-width: 0;
    max-width: 100vw;
    padding: 28px clamp(18px, 4vw, 48px) 56px;
  }
  .topbar {
    margin: 0 0 22px;
  }
  .title {
    min-width: 0;
  }
  .eyebrow {
    display: inline-flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    overflow-wrap: anywhere;
  }
  .eyebrow::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--up);
    box-shadow: 0 0 0 5px rgba(38, 122, 83, 0.12);
  }
  .title h2 {
    margin: 0;
    max-width: 760px;
    font-size: 30px;
    line-height: 1.1;
    letter-spacing: 0;
    font-weight: 780;
  }
  .title p {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    overflow-wrap: anywhere;
  }

  .controls {
    display: grid;
    gap: 12px;
    min-width: 0;
    margin: 0 0 18px;
    padding: 0 0 18px;
    border-bottom: 1px solid var(--line);
  }
  .search {
    position: relative;
    min-width: 0;
  }
  .search input {
    width: 100%;
    min-width: 0;
    min-height: 46px;
    padding: 0 64px 0 12px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    outline: none;
    color: var(--ink);
    background: var(--surface);
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.04);
  }
  .search input:focus {
    border-color: var(--home);
    box-shadow: 0 0 0 4px rgba(212, 92, 63, 0.12);
  }
  .search svg {
    position: absolute;
    right: 12px;
    top: 50%;
    width: 18px;
    height: 18px;
    transform: translateY(-50%);
    color: var(--muted);
  }
  .kbd {
    position: absolute;
    right: 36px;
    top: 50%;
    transform: translateY(-50%);
    min-width: 24px;
    padding: 1px 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--muted);
    background: var(--surface-2);
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
  }

  .zoom {
    display: grid;
    gap: 10px;
    min-width: 0;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: color-mix(in srgb, var(--surface) 88%, var(--surface-3));
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.04);
  }
  .zoom-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .zoom-title {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 760;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .zoom-title svg {
    width: 17px;
    height: 17px;
    color: var(--soft);
  }
  .zoom output {
    display: block;
    min-width: 58px;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 7px;
    color: var(--ink);
    background: var(--surface);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .zoom-row {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) 34px;
    gap: 10px;
    align-items: center;
  }
  .zoom-slider {
    display: grid;
    gap: 3px;
    min-width: 0;
  }
  .zoom-bounds {
    display: flex;
    justify-content: space-between;
    color: var(--soft);
    font-family: var(--mono);
    font-size: 10px;
  }
  .zoom button {
    display: grid;
    place-items: center;
    height: 34px;
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--muted);
    background: var(--surface);
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.03);
  }
  .zoom button:hover {
    color: var(--ink);
    border-color: var(--line-strong);
    background: var(--surface-2);
  }
  .zoom button:disabled {
    cursor: default;
    opacity: 0.42;
  }
  .zoom button:focus-visible {
    outline: 3px solid rgba(212, 92, 63, 0.16);
    outline-offset: 2px;
  }
  .zoom button svg {
    width: 16px;
    height: 16px;
  }
  .zoom input {
    width: 100%;
    min-width: 0;
    accent-color: var(--home);
  }
  .zoom-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .zoom-actions button {
    grid-auto-flow: column;
    justify-content: center;
    gap: 7px;
    padding: 0 8px;
    color: var(--ink);
    font-size: 12px;
    font-weight: 680;
  }
  .zoom-actions button svg {
    width: 15px;
    height: 15px;
  }

  .workspace {
    zoom: var(--zoom);
    transform-origin: top left;
  }

  .wing {
    --c: var(--home);
    margin: 0 0 34px;
  }
  .heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin: 0 0 12px;
  }
  .heading-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .heading svg { color: var(--c); }
  .heading h2 {
    margin: 0;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .heading .n {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
  }
  .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, color-mix(in srgb, var(--c) 44%, var(--line)), transparent);
  }

  .deck {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
    gap: 12px;
    min-width: 0;
  }

  .svc {
    position: relative;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    min-height: 168px;
    min-width: 0;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    box-shadow: 0 1px 2px rgba(23, 32, 22, 0.04);
    transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
  }
  a.svc:hover {
    transform: translateY(-2px);
    border-color: color-mix(in srgb, var(--c) 48%, var(--line));
    box-shadow: var(--shadow);
  }
  a.svc:focus-visible {
    outline: 3px solid color-mix(in srgb, var(--c) 32%, transparent);
    outline-offset: 2px;
  }
  .svc.passive {
    background: linear-gradient(180deg, var(--surface-2), color-mix(in srgb, var(--c) 5%, var(--surface-2)));
    border-style: dashed;
  }
  .svc-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-width: 0;
  }
  .icon {
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    color: var(--c);
    background: color-mix(in srgb, var(--c) 10%, var(--surface));
  }
  .state {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: 24px;
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
    background: var(--surface-2);
    font-size: 11px;
    font-weight: 750;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--passive);
  }
  .state[data-s="up"] { color: var(--up); border-color: rgba(38, 122, 83, 0.25); }
  .state[data-s="up"] .dot { background: var(--up); box-shadow: 0 0 0 4px rgba(38, 122, 83, 0.12); }
  .state[data-s="checking"] { color: var(--checking); border-color: rgba(212, 147, 36, 0.28); }
  .state[data-s="checking"] .dot { background: var(--checking); animation: breathe 1.4s ease-in-out infinite; }
  .state[data-s="down"] { color: var(--down); border-color: rgba(186, 55, 45, 0.24); }
  .state[data-s="down"] .dot { background: var(--down); }
  .state[data-s="cert"] { color: var(--checking); border-color: rgba(212, 147, 36, 0.28); }
  .state[data-s="cert"] .dot { background: var(--checking); box-shadow: 0 0 0 4px rgba(212, 147, 36, 0.12); }
  .state[data-s="external"],
  .state[data-s="protected"] { color: var(--up); border-color: rgba(38, 122, 83, 0.22); }
  .state[data-s="external"] .dot,
  .state[data-s="protected"] .dot { background: transparent; box-shadow: inset 0 0 0 1.5px var(--up); }

  /* HOSTD-7 — states the dashboard could not previously express.

     "running": the HOST vouches for it (docker ps / systemctl). Solid green, because
     this is stronger evidence than any browser probe — it is not a guess at all.

     "unreachable": running, but THIS browser cannot reach it (self-signed cert, wrong
     network path, Tailscale, CORP). Amber, hollow: something is off, but it is about
     the route, not the service. Rendering this as red "Down" — as the old code did —
     sent you hunting a service that was never broken.

     "stopped": the host says it is NOT running. Solid red, and trustworthy, unlike a
     "Down" inferred from a failed socket.

     "unknown": no host truth and nothing probeable. Grey. The most important addition:
     the dashboard is now able to admit it does not know, instead of drawing a
     confident dot over a state nobody measured. */
  .state[data-s="running"] { color: var(--up); border-color: rgba(38, 122, 83, 0.25); }
  .state[data-s="running"] .dot { background: var(--up); box-shadow: 0 0 0 4px rgba(38, 122, 83, 0.12); }
  .state[data-s="unreachable"] { color: var(--checking); border-color: rgba(212, 147, 36, 0.28); }
  .state[data-s="unreachable"] .dot { background: transparent; box-shadow: inset 0 0 0 1.5px var(--checking); }
  .state[data-s="stopped"] { color: var(--down); border-color: rgba(186, 55, 45, 0.24); }
  .state[data-s="stopped"] .dot { background: var(--down); }
  .state[data-s="unknown"] { color: var(--muted); border-color: rgba(120, 120, 120, 0.22); }
  .state[data-s="unknown"] .dot { background: transparent; box-shadow: inset 0 0 0 1.5px var(--muted); }
  .state[data-s="passive"] { color: var(--soft); }
  .state[data-s="passive"] .dot { background: transparent; box-shadow: inset 0 0 0 1.5px var(--passive); }

  .svc h3 {
    margin: 0;
    font-size: 18px;
    line-height: 1.2;
    letter-spacing: 0;
  }
  .purpose {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .svc-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: var(--muted);
  }
  .port {
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .action {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--c);
    font-size: 12px;
    font-weight: 760;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.16s ease, transform 0.16s ease;
  }
  .action svg { width: 14px; height: 14px; }
  a.svc:hover .action, a.svc:focus-visible .action {
    opacity: 1;
    transform: translateX(0);
  }

  .empty {
    display: none;
    padding: 26px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
  }

  .hidden { display: none !important; }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 28px;
    color: var(--muted);
    font-size: 12px;
  }
  .meta span {
    padding: 6px 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--surface);
  }
  .meta code {
    font-family: var(--mono);
    font-size: 11px;
  }

  @keyframes breathe { 50% { opacity: 0.36; } }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  @media (max-width: 900px) {
    .app { display: block; }
    .side {
      position: relative;
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(220px, 1.35fr);
      gap: 12px 14px;
      height: auto;
      padding: 14px;
      border-right: 0;
      border-bottom: 1px solid var(--line);
      overflow: visible;
    }
    .brand {
      align-self: center;
      padding: 0;
    }
    .status-panel {
      align-self: start;
      margin: 0;
      padding: 10px 12px;
    }
    .controls {
      grid-column: 2;
      grid-row: 1 / span 2;
      align-self: stretch;
      margin: 0;
      padding: 0 0 0 14px;
      border-bottom: 0;
      border-left: 1px solid var(--line);
      align-content: center;
    }
    .nav {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 4px;
    }
    .nav .chip {
      width: auto;
      min-width: max-content;
      grid-template-columns: 8px auto auto;
      background: var(--surface);
      border-color: var(--line);
    }
    .main { padding-top: 22px; }
    .topbar { margin-bottom: 18px; }
    .title h2 { font-size: 30px; }
  }
  @media (max-width: 560px) {
    .main { padding-inline: 14px; }
    .side {
      grid-template-columns: 1fr;
      padding: 12px;
    }
    .brand {
      grid-template-columns: 38px 1fr;
      gap: 10px;
    }
    .mark {
      width: 38px;
      height: 38px;
    }
    .brand h1 { font-size: 24px; }
    .status-panel {
      grid-template-columns: 1fr auto;
      align-items: center;
    }
    .controls {
      grid-column: 1;
      grid-row: auto;
      padding: 0 0 12px;
      border-left: 0;
      border-bottom: 1px solid var(--line);
    }
    .zoom-actions { grid-template-columns: 1fr; }
    .deck { grid-template-columns: 1fr; }
    .heading { align-items: flex-start; }
    .rule { display: none; }
    .svc { min-height: 148px; }
    .title h2 { font-size: 28px; }
  }
</style>
</head>

<script type="module">
const FALLBACK_CONFIG = window.HOSTDASH_CONFIG || null;
const MANIFEST_URL = window.HOSTDASH_MANIFEST_URL || "./manifest.json";

const isObject = value => value && typeof value === "object" && !Array.isArray(value);
const isHex = value => typeof value === "string" && /^#[0-9a-fA-F]{6}$/.test(value);
const objectOr = value => isObject(value) ? value : {};
const arrayOrEmpty = value => Array.isArray(value) ? value : [];
const stringOr = (value, fallback = "") => typeof value === "string" ? value : fallback;

function cleanMeta(meta) {
  return arrayOrEmpty(meta)
    .map(item => {
      if (typeof item === "string") return item;
      if (isObject(item) && typeof item.text === "string") {
        return { text: item.text, code: item.code === true };
      }
      return null;
    })
    .filter(Boolean);
}

function cleanWings(wings) {
  return arrayOrEmpty(wings)
    .filter(wing => isObject(wing) && typeof wing.id === "string" && typeof wing.name === "string")
    .map(wing => ({
      id: wing.id,
      name: wing.name,
      color: stringOr(wing.color, "var(--home)"),
      icon: stringOr(wing.icon, "server"),
    }));
}

function cleanServices(services) {
  return arrayOrEmpty(services)
    .filter(service => isObject(service) && typeof service.wing === "string" && typeof service.name === "string")
    .map(service => {
      const rawStatusPolicy = objectOr(service.statusPolicy);
      const statusPolicy = {
        source: stringOr(rawStatusPolicy.source, "hostdash-probe"),
        ...(typeof rawStatusPolicy.staticState === "string" ? { staticState: rawStatusPolicy.staticState } : {}),
      };
      const status = typeof service.status === "string"
        ? service.status
        : statusPolicy.staticState || null;
      const url = typeof service.url === "string" ? service.url : null;
      const probe = typeof service.probe === "boolean" || typeof service.probe === "string"
        ? service.probe
        : null;
      return {
        wing: service.wing,
        name: service.name,
        purpose: stringOr(service.purpose),
        icon: stringOr(service.icon, "server"),
        urls: objectOr(service.urls),
        sameHost: service.sameHost === true,
        passive: service.passive === true || !url,
        certIssue: service.certIssue === true,
        statusPolicy,
        ...(url ? { url } : {}),
        ...(typeof service.scheme === "string" ? { scheme: service.scheme } : {}),
        ...(typeof service.port === "string" ? { port: service.port } : {}),
        ...(typeof service.hostPort === "string" ? { hostPort: service.hostPort } : {}),
        ...(typeof service.path === "string" ? { path: service.path } : {}),
        ...(typeof service.search === "string" ? { search: service.search } : {}),
        ...(typeof service.foot === "string" ? { foot: service.foot } : {}),
        ...(status ? { status } : {}),
        ...(probe !== null ? { probe } : {}),
        ...(typeof service.note === "string" ? { note: service.note } : {}),
      };
    });
}

function manifestToConfig(manifest) {
  if (!isObject(manifest)) throw new Error("manifest is not an object");
  if (manifest.schema !== "inspr.hostdash.config.v1") throw new Error("unsupported manifest schema");
  if (manifest.version !== 1) throw new Error("unsupported manifest version");

  const host = objectOr(manifest.host);
  if (typeof host.name !== "string") throw new Error("manifest host.name is required");

  const wings = cleanWings(manifest.wings);
  const services = cleanServices(manifest.services);
  if (!wings.length) throw new Error("manifest wings are required");
  if (!services.length) throw new Error("manifest services are required");

  const slug = stringOr(manifest.slug, host.name);
  return {
    __source: "manifest-json",
    schema: manifest.schema,
    version: manifest.version,
    slug,
    storageKey: stringOr(manifest.storageKey, `hostdash.${slug}`),
    host,
    meta: cleanMeta(manifest.meta),
    palette: objectOr(manifest.palette),
    policy: objectOr(manifest.policy),
    wings,
    services,
  };
}

async function loadManifestConfig() {
  try {
    const response = await fetch(MANIFEST_URL, { cache: "no-store" });
    if (!response.ok) return null;
    return manifestToConfig(await response.json());
  } catch (error) {
    console.warn(`HostDash manifest ignored: ${error.message}`);
    return null;
  }
}

async function loadHostdashConfig() {
  const manifestConfig = await loadManifestConfig();
  if (manifestConfig) return manifestConfig;
  if (FALLBACK_CONFIG) return { __source: "config-js", ...FALLBACK_CONFIG };
  throw new Error("HostDash config.js is missing and no valid manifest.json is available");
}

function applyPalette(config) {
  const palette = objectOr(config.palette);
  const gradient = objectOr(palette.gradient);
  const accent = palette.accent || gradient.primary;
  if (!isHex(accent)) return;

  const root = document.documentElement;
  root.style.setProperty("--home", accent);
  root.style.setProperty("--manifest-accent", accent);
  if (isHex(gradient.lightest)) root.style.setProperty("--line-strong", gradient.lightest);
}

// ── HOST TRUTH (HOSTD-7 / NIX-280) ───────────────────────────────────────────
//
// Until now the ONLY status signal was a browser `fetch(url, {mode:"no-cors"})`.
// That response is OPAQUE by design: the status code, headers and body cannot be
// read, and `.then()` fires merely because the request did not network-error.
//
// So the dashboard could not distinguish:
//   * HTTP 500                         -> reported "Online"
//   * self-signed cert (Scrypted)      -> reported "Down", while running fine
//   * running, but not on this network -> reported "Down"
//   * no HTTP endpoint at all          -> never checked; 9 of 19 services on hsb1
//
// It answered "can my browser open a socket?" and printed that as "Online". Half
// the board was a state nobody had measured — the same failure as the babycam that
// showed a perfect picture and made no sound (NIX-151). A monitor that reports
// health it cannot verify is worse than none, because it is trusted.
//
// `running` cannot be known client-side. Ever. So the HOST now says so: a generator
// writes status.json (docker ps + systemctl) and nginx serves it SAME-ORIGIN, which
// is what makes it readable at all. Host truth OUTRANKS the browser probe; the probe
// is demoted to what it actually measures — client reachability.
const STATUS_URL = window.HOSTDASH_STATUS_URL || "./status/status.json";

// The artifact refreshes every 60s. Anything older than this is treated as UNKNOWN,
// never as healthy. A dead generator whose last file still says "running" would leave
// the board reading green forever — which is exactly the bug being fixed, reintroduced
// one layer down. Staleness must degrade to honest ignorance.
const STATUS_MAX_AGE_MS = 5 * 60 * 1000;

let HOST_STATUS = null;

async function loadHostStatus() {
  try {
    const response = await fetch(STATUS_URL, { cache: "no-store" });
    if (!response.ok) return null;
    const data = await response.json();
    if (data.schema !== "inspr.hostdash.status.v1") return null;
    const ageMs = Date.now() - (Number(data.generated) || 0) * 1000;
    if (ageMs > STATUS_MAX_AGE_MS) {
      console.warn(`[hostdash] status artifact is stale (${Math.round(ageMs / 1000)}s) — ignoring`);
      return null;
    }
    return data;
  } catch {
    // Absent or unreachable is FINE: we fall back to probe-only behaviour and simply
    // know less. Degrading to ignorance is correct; degrading to green is not.
    return null;
  }
}

// "running" | "stopped" | null (= no host truth for this service; do not guess)
function hostStateFor(service) {
  if (!HOST_STATUS) return null;
  if (service.container) {
    const entry = HOST_STATUS.containers?.[service.container];
    if (!entry) return null;
    return entry.running ? "running" : "stopped";
  }
  if (service.unit) {
    const entry = HOST_STATUS.units?.[service.unit];
    if (!entry) return null;
    return entry.running ? "running" : "stopped";
  }
  return null;
}

const CONFIG = await loadHostdashConfig();
HOST_STATUS = await loadHostStatus();
document.documentElement.dataset.configSource = CONFIG.__source || "unknown";
document.documentElement.dataset.hostTruth = HOST_STATUS ? "live" : "absent";
applyPalette(CONFIG);

const WINGS = CONFIG.wings || [];
const SVC = CONFIG.services || [];
const storagePrefix = CONFIG.storageKey || `hostdash.${CONFIG.host?.name || "host"}`;
const wingKey = `${storagePrefix}.wing`;

const el = (tag, className) => {
  const node = document.createElement(tag);
  if (className) node.className = className;
  return node;
};

function setText(id, value) {
  const node = document.getElementById(id);
  if (node) node.textContent = value || "";
}

function renderHostInfo() {
  const host = CONFIG.host || {};
  const eyebrow = host.eyebrow || [host.os, host.fqdn, host.ip].filter(Boolean).join(" · ");
  const subtitle = host.subtitle || [host.role, host.fqdn, host.ip, host.os].filter(Boolean).join(" · ");

  document.title = host.title || `${host.name || "HostDash"} · ${host.role || "services"}`;
  setText("hostName", host.name || "HostDash");
  setText("hostRole", host.role || "services");
  setText("hostEyebrow", eyebrow || "HostDash");
  setText("mainTitle", host.heading || "Services");
  setText("hostSubtitle", subtitle || "Host service dashboard");

  const meta = document.getElementById("meta");
  (CONFIG.meta || []).forEach(item => {
    const span = el("span");
    const text = typeof item === "string" ? item : item.text;
    if (typeof item === "object" && item.code) {
      const code = el("code");
      code.textContent = text;
      span.appendChild(code);
    } else {
      span.textContent = text;
    }
    meta.appendChild(span);
  });
}

const wingsEl = document.getElementById("wings");
const sideChips = document.getElementById("sideChips");
const empty = document.getElementById("empty");
let filter = localStorage.getItem(wingKey) || "all";
const cardIndex = [];

function makeChip(id, label, color) {
  const button = el("button", "chip");
  button.type = "button";
  button.dataset.wing = id;
  button.style.setProperty("--c", color || "var(--ink)");
  button.setAttribute("aria-pressed", id === filter);
  button.innerHTML = `<span class="swatch"></span><span class="label">${label}</span><span class="n" data-n="${id}">0</span>`;
  button.addEventListener("click", () => {
    filter = id;
    localStorage.setItem(wingKey, id);
    applyFilter();
  });
  return button;
}

function renderChips(target) {
  target.appendChild(makeChip("all", "All services", "var(--ink)"));
  WINGS.forEach(wing => target.appendChild(makeChip(wing.id, wing.name, wing.color)));
}
renderHostInfo();
renderChips(sideChips);

WINGS.forEach(wing => {
  const services = SVC.filter(service => service.wing === wing.id);
  const section = el("section", "wing");
  section.dataset.wing = wing.id;
  section.style.setProperty("--c", wing.color);

  const heading = el("div", "heading");
  heading.innerHTML = `
    <div class="heading-left">
      <svg><use href="#i-${wing.icon}"></use></svg>
      <h2>${wing.name}</h2>
      <span class="n">${services.length}</span>
    </div>
    <div class="rule"></div>`;
  section.appendChild(heading);

  const deck = el("div", "deck");
  services.forEach(service => {
    const active = !service.passive;
    // A service the HOST can vouch for is trackable even with no URL to click.
    // This is what finally lights up the passive half of the board — Mosquitto,
    // restic, Watchtower, pharos-beacon and friends, which have no HTTP endpoint
    // and so were never checked at all, merely drawn.
    const tracked = !!(service.container || service.unit);
    const card = active ? el("a", "svc") : el("div", "svc passive");
    card.style.setProperty("--c", wing.color);
    card.dataset.name = `${service.name} ${service.purpose} ${service.port || service.foot || ""}`.toLowerCase();

    if (service.container) card.dataset.container = service.container;
    if (service.unit) card.dataset.unit = service.unit;

    if (active) {
      const targetUrl = serviceTargetUrl(service);
      card.href = targetUrl;
      card.target = "_blank";
      card.rel = "noopener";
      if (service.status) card.dataset.staticState = service.status;
      else if (service.probe === false) card.dataset.staticState = "external";
      else card.dataset.probe = targetUrl;
      // NOTE: `certIssue` is deliberately NOT a static state any more. It existed
      // only to stop a self-signed cert being reported as "Down" — a workaround for
      // the probe's blindness. With host truth we can say the true thing instead:
      // running, but the browser cannot reach it. The flag survives as a hint below.
      if (service.certIssue) card.dataset.certIssue = "1";
    }
    if (service.note) card.title = service.note;

    const status = service.status || (active || tracked ? "checking" : "passive");
    const statusLabel = statusText(status);
    const foot = active
      ? `<span class="port">${service.port}</span><span class="action">Open <svg><use href="#i-arrow"></use></svg></span>`
      : `<span class="port">${service.foot || ""}</span>`;

    card.innerHTML = `
      <div class="svc-top">
        <span class="icon"><svg><use href="#i-${service.icon}"></use></svg></span>
        <span class="state" data-s="${status}"><span class="dot"></span><span class="state-label">${statusLabel}</span></span>
      </div>
      <div>
        <h3>${service.name}</h3>
        <p class="purpose">${service.purpose}</p>
      </div>
      <div class="svc-foot">${foot}</div>`;
    deck.appendChild(card);
    if (active || tracked) cardIndex.push(card);
  });
  section.appendChild(deck);
  wingsEl.appendChild(section);
});

function serviceTargetUrl(service) {
  if (!service.sameHost || !/^https?:$/.test(window.location.protocol) || !window.location.hostname) {
    return service.url;
  }

  const target = new URL(window.location.href);
  target.protocol = service.scheme || target.protocol;
  target.port = String(service.hostPort || service.port || "").replace(/^:/, "").split(/\s+/)[0];
  target.pathname = service.path || "/";
  target.search = service.search || "";
  target.hash = "";
  return target.href;
}

function statusText(state) {
  if (state === "up") return "Online";
  if (state === "running") return "Running"; // host says so; nothing here to open
  if (state === "unreachable") return "Unreachable"; // running — but not from THIS browser
  if (state === "stopped") return "Stopped"; // host says so. authoritative.
  if (state === "unknown") return "Unknown"; // no host truth, nothing probeable — say so
  if (state === "down") return "Down";
  if (state === "cert") return "TLS cert";
  if (state === "external") return "External";
  if (state === "protected") return "Protected";
  if (state === "checking") return "Checking";
  return "Passive";
}

function counts() {
  const per = {};
  WINGS.forEach(wing => { per[wing.id] = 0; });
  let online = 0;
  // What counts as "online" is a claim, so only count what was actually established.
  //
  // `unreachable` COUNTS: the host confirmed the service is running. Your browser just
  // cannot get to it, which is a fact about the network, not about the service.
  //
  // `unknown` does NOT count, and neither does `stopped` or `down`. Previously `cert`
  // and `external` were counted as online without anything ever being verified — a
  // number inflated by services nobody had checked. They still count (a cert error and
  // an external link both imply something is answering), but nothing UNMEASURED does.
  const ONLINE = new Set(["up", "running", "unreachable", "cert", "external", "protected"]);
  cardIndex.forEach(card => {
    const state = card.querySelector(".state").dataset.s;
    if (ONLINE.has(state)) {
      online += 1;
      per[card.closest(".wing").dataset.wing] += 1;
    }
  });
  document.getElementById("onCount").textContent = online;
  document.getElementById("totCount").textContent = cardIndex.length;
  document.querySelectorAll(".chip .n").forEach(node => {
    const id = node.dataset.n;
    node.textContent = id === "all" ? `${online}/${cardIndex.length}` : (per[id] || 0);
  });
}

function syncPressed() {
  document.querySelectorAll(".chip").forEach(chip => {
    chip.setAttribute("aria-pressed", chip.dataset.wing === filter);
  });
}

function applyFilter() {
  syncPressed();
  runSearch();
}

const search = document.getElementById("q");
const workspace = document.getElementById("workspace");
const zoomRange = document.getElementById("zoomRange");
const zoomValue = document.getElementById("zoomValue");
const zoomFit = document.getElementById("zoomFit");
const zoomReset = document.getElementById("zoomReset");
const zoomOut = document.getElementById("zoomOut");
const zoomIn = document.getElementById("zoomIn");
const zoomKey = `${storagePrefix}.zoom`;
const zoomModeKey = `${storagePrefix}.zoomMode`;

function clampZoom(value) {
  return Math.max(50, Math.min(200, Math.round(Number(value) / 5) * 5));
}

function setZoom(value, mode = "manual") {
  const next = clampZoom(value);
  document.documentElement.style.setProperty("--zoom", String(next / 100));
  zoomRange.value = String(next);
  zoomValue.value = `${next}%`;
  zoomValue.textContent = `${next}%`;
  zoomOut.disabled = next <= 50;
  zoomIn.disabled = next >= 200;
  localStorage.setItem(zoomKey, String(next));
  localStorage.setItem(zoomModeKey, mode);
}

function fitAll() {
  filter = "all";
  localStorage.setItem(wingKey, filter);
  search.value = "";
  applyFilter();
  setZoom(100, "fit");
  requestAnimationFrame(() => {
    const box = workspace.getBoundingClientRect();
    const availableWidth = Math.max(320, document.documentElement.clientWidth - box.left - 18);
    const availableHeight = Math.max(360, window.innerHeight - box.top - 18);
    const scale = Math.min(1, availableWidth / workspace.scrollWidth, availableHeight / workspace.scrollHeight);
    setZoom(Math.max(50, Math.floor(scale * 100 / 5) * 5), "fit");
  });
}

zoomRange.addEventListener("input", () => setZoom(zoomRange.value));
zoomOut.addEventListener("click", () => setZoom(Number(zoomRange.value) - 5));
zoomIn.addEventListener("click", () => setZoom(Number(zoomRange.value) + 5));
zoomReset.addEventListener("click", () => setZoom(100));
zoomFit.addEventListener("click", fitAll);
window.addEventListener("resize", () => {
  if (localStorage.getItem(zoomModeKey) === "fit") fitAll();
});

setZoom(localStorage.getItem(zoomKey) || 100, localStorage.getItem(zoomModeKey) || "manual");

function runSearch() {
  const term = search.value.trim().toLowerCase();
  let visibleSections = 0;
  document.querySelectorAll(".wing").forEach(section => {
    if (filter !== "all" && section.dataset.wing !== filter) {
      section.classList.add("hidden");
      return;
    }

    let shown = 0;
    section.querySelectorAll(".svc").forEach(card => {
      const hit = !term || card.dataset.name.includes(term);
      card.classList.toggle("hidden", !hit);
      if (hit) shown += 1;
    });

    section.classList.toggle("hidden", shown === 0);
    if (shown > 0) visibleSections += 1;
  });
  empty.style.display = visibleSections === 0 ? "block" : "none";
}

search.addEventListener("input", runSearch);
document.addEventListener("keydown", event => {
  if (event.key === "/" && document.activeElement !== search) {
    event.preventDefault();
    search.focus();
  }
  if (event.key === "Escape") {
    search.value = "";
    search.blur();
    runSearch();
  }
});

function setStatus(card, state) {
  const badge = card.querySelector(".state");
  badge.dataset.s = state;
  badge.querySelector(".state-label").textContent = statusText(state);
}

// What the host says about this card: "running" | "stopped" | null.
function cardHostState(card) {
  if (!HOST_STATUS) return null;
  const { container, unit } = card.dataset;
  const entry = container
    ? HOST_STATUS.containers?.[container]
    : unit
      ? HOST_STATUS.units?.[unit]
      : null;
  if (!entry) return null;
  return entry.running ? "running" : "stopped";
}

// The probe measures ONE thing: can THIS BROWSER reach it. It is no longer allowed
// to pronounce on whether the service is running — it never could, it just did.
//
// `hostState` is the host's verdict, and it wins on the question of running/stopped.
// The probe only refines it with client reachability:
//
//   host running + probe ok   -> "up"          — running, and you can open it
//   host running + probe fail -> "unreachable"  — running; YOUR path to it is broken
//                                (self-signed cert, wrong network, Tailscale, CORP).
//                                Emphatically NOT "Down". The service is fine.
//   no host truth + probe ok   -> "up"          — legacy behaviour, all we can say
//   no host truth + probe fail -> "down"        — legacy behaviour, honestly ambiguous
function probe(card, hostState) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 4000);
  fetch(card.dataset.probe, { mode: "no-cors", signal: controller.signal })
    .then(() => setStatus(card, "up"))
    .catch(() => setStatus(card, hostState === "running" ? "unreachable" : "down"))
    .finally(() => {
      clearTimeout(timeout);
      counts();
    });
}

function sweep() {
  let index = 0;
  const queue = [...cardIndex];
  (function next() {
    if (index >= queue.length) return;
    const batch = queue.slice(index, index + 5);
    index += 5;
    batch.forEach(card => {
      if (card.dataset.staticState) {
        setStatus(card, card.dataset.staticState);
        counts();
        return;
      }

      const host = cardHostState(card);

      // The host says it is NOT running. That is authoritative and needs no probe —
      // and it is the one thing the old dashboard could never tell you, because an
      // unreachable socket and a stopped service looked identical.
      if (host === "stopped") {
        setStatus(card, "stopped");
        counts();
        return;
      }

      // Nothing to probe (no HTTP endpoint). Previously these were drawn as inert
      // "Passive" chips and excluded from the counts entirely. Now the host can
      // actually answer for them.
      if (!card.dataset.probe) {
        setStatus(card, host === "running" ? "running" : "unknown");
        counts();
        return;
      }

      setStatus(card, "checking");
      probe(card, host);
    });
    setTimeout(next, 300);
  })();
}

function tick() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleDateString("de-AT", { weekday: "short", day: "2-digit", month: "2-digit" }) +
    " · " +
    now.toLocaleTimeString("de-AT", { hour: "2-digit", minute: "2-digit" });
}

applyFilter();
counts();
tick();
sweep();
setInterval(tick, 60000);
setInterval(sweep, 25000 + Math.random() * 10000);
</script>
</body>
</html>
